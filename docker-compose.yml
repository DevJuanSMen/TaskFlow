version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: taskflow
    volumes:
      - mongo_data:/data/db
    networks:
      - taskflow-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: taskflow_jwt_secret_key_2024
      JWT_EXPIRE: 7d
      PORT: 3000
      MAX_FILE_SIZE: 10485760
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - taskflow-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - taskflow-network

volumes:
  mongo_data:

networks:
  taskflow-network:
    driver: bridge
